name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - prod
      venture:
        description: Venture to deploy
        required: true
        type: string
        default: venture
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - aws
          - floci
        default: aws
      services:
        description: Comma-separated service names. Leave empty for all services in the environment.
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ inputs.target == 'aws' }}
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-terraform
          aws-region: ap-southeast-2

      - uses: hashicorp/setup-terraform@v3

      - run: pnpm typecheck

      - name: Deploy selected services
        run: |
          if [ -n "${{ inputs.services }}" ]; then
            pnpm platform:deploy -- --env "${{ inputs.environment }}" --venture "${{ inputs.venture }}" --target "${{ inputs.target }}" --services "${{ inputs.services }}"
          else
            pnpm platform:deploy -- --env "${{ inputs.environment }}" --venture "${{ inputs.venture }}" --target "${{ inputs.target }}"
          fi
