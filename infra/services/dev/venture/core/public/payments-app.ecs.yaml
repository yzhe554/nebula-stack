# yaml-language-server: $schema=../../../../../../packages/platform/schemas/ecs.schema.json
cluster:
  capacity: fargate
service:
  desiredCount: 1
  containerPort: 3002
  autoscaling:
    minCount: 1
    maxCount: 2
    targetCpuUtilization: 60
    targetMemoryUtilization: 70
task:
  cpu: 256
  memoryMb: 512
image:
  repository: nebula-payments
  tag: local
healthCheck:
  path: /payments
