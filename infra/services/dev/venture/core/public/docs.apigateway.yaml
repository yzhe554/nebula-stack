# yaml-language-server: $schema=../../../../../../packages/platform/schemas/apigateway.schema.json
description: Docs app ingress.
domain:
  floci:
    name: app.localhost.floci.io
    zoneName: localhost.floci.io
  aws:
    name: app.dev.your-company.com
    zoneName: dev.your-company.com
    certificate:
      lookupDomain: "*.dev.your-company.com"
routes:
  - path: /docs
    method: ANY
    target:
      type: http_proxy
      uri: http://host.docker.internal:3001/docs
    targets:
      floci:
        type: ecs
        service: docs-app
      aws:
        type: ecs
        service: docs-app
  - path: /docs/{proxy+}
    method: ANY
    target:
      type: http_proxy
      uri: http://host.docker.internal:3001/docs/{proxy}
    targets:
      floci:
        type: ecs
        service: docs-app
      aws:
        type: ecs
        service: docs-app
